<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jacked — Antrenament 3 zile</title>
<meta name="description" content="Jurnal de antrenament: programul Average to Jacked pe 3 zile — Push, Legs, Pull.">
<meta name="theme-color" content="#F2F1EC">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="brand-plate" viewBox="0 0 40 40" aria-hidden="true">
      <circle cx="20" cy="20" r="18" fill="#17191C"/>
      <circle cx="20" cy="20" r="13.5" fill="none" stroke="#FAFAF9" stroke-width="1.4" opacity=".55"/>
      <circle cx="20" cy="20" r="4.4" fill="#FAFAF9"/>
    </svg>
    <div>
      <h1>JACKED</h1>
      <p class="brand-sub">Push · Legs · Pull — 3 zile / săpt</p>
    </div>
  </div>
  <div id="streak" class="streak" hidden></div>
</header>

<main id="main">
  <!-- AZI -->
  <section id="view-azi" class="view" data-view="azi"></section>
  <!-- PROGRAM -->
  <section id="view-program" class="view" data-view="program" hidden></section>
  <!-- PROGRES -->
  <section id="view-progres" class="view" data-view="progres" hidden></section>
  <!-- UNELTE -->
  <section id="view-unelte" class="view" data-view="unelte" hidden></section>
</main>

<nav class="tabbar" role="tablist" aria-label="Navigare">
  <button class="tab active" data-tab="azi" role="tab" aria-selected="true">
    <svg viewBox="0 0 24 24"><path d="M4 11h2v5H4zm14 0h2v5h-2zM7 9h2v9H7zm8 0h2v9h-2zm-5 3h4v3h-4z"/></svg>
    <span>Azi</span>
  </button>
  <button class="tab" data-tab="program" role="tab" aria-selected="false">
    <svg viewBox="0 0 24 24"><path d="M5 4h14v2H5zm0 5h14v2H5zm0 5h9v2H5zm0 5h9v2H5z"/></svg>
    <span>Program</span>
  </button>
  <button class="tab" data-tab="progres" role="tab" aria-selected="false">
    <svg viewBox="0 0 24 24"><path d="M4 19h16v2H4zm1-3 4.5-5 3 3L19 7.5V12h2V4h-8v2h4.5L12.5 11l-3-3L3 14.5z"/></svg>
    <span>Progres</span>
  </button>
  <button class="tab" data-tab="unelte" role="tab" aria-selected="false">
    <svg viewBox="0 0 24 24"><path d="M13.8 9.2 20 3l1 1-6.2 6.2zM3 20l6.2-6.2 1 1L4 21zm7.4-9.6 3.2 3.2-1.9 1.9a4 4 0 0 1-4.4.9L4 19.7l-.7-.7 3.3-3.3a4 4 0 0 1 .9-4.4zm6.4-6.4.7.7-3.3 3.3a4 4 0 0 1-.9 4.4l-.5.5-3.2-3.2.5-.5a4 4 0 0 1 4.4-.9z"/></svg>
    <span>Unelte</span>
  </button>
</nav>

<!-- Timer pauză (foaie fixă jos) -->
<div id="rest-sheet" class="rest-sheet" hidden>
  <div class="rest-inner">
    <svg id="rest-plate" class="rest-plate" viewBox="0 0 120 120" aria-hidden="true">
      <circle cx="60" cy="60" r="54" class="plate-bg"/>
      <path id="rest-arc" class="plate-arc" d=""/>
      <circle cx="60" cy="60" r="40" class="plate-face"/>
      <circle cx="60" cy="60" r="12" class="plate-hub"/>
      <text id="rest-digits" x="60" y="60" class="plate-digits" text-anchor="middle" dominant-baseline="central">2:00</text>
    </svg>
    <div class="rest-info">
      <p class="rest-label">Pauză</p>
      <p id="rest-next" class="rest-next"></p>
      <div class="rest-actions">
        <button id="rest-plus" class="btn ghost">+30s</button>
        <button id="rest-skip" class="btn ghost">Sari peste</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal video execuție -->
<div id="video-modal" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="video-title">Execuție</h3>
      <button id="video-close" class="btn-x" aria-label="Închide">✕</button>
    </div>
    <div class="video-box"><div id="yt-player"></div></div>
    <p class="video-note">Secvență în buclă din canalul <a id="video-link" href="#" target="_blank" rel="noopener">Average to Jacked</a>.</p>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
